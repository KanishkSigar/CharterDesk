<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CharterDesk — Negotiations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="dash">
  <div class="dash-top">
    <div class="brand">
      <div class="brand-mark">CD</div>
      <div>
        <div class="brand-name">CharterDesk</div>
        <div class="brand-sub">Negotiations dashboard</div>
      </div>
    </div>
    <div class="dash-actions">
      <button class="btn-ghost" data-theme-toggle title="Toggle theme">🌙</button>
      <input id="who" placeholder="Your name" />
      <button id="btnNew">+ New negotiation</button>
    </div>
  </div>

  <div class="tiles">
    <div class="tile t-total"><div class="num" id="tTotal">0</div><div class="lbl">Total negotiations</div></div>
    <div class="tile t-neg"><div class="num" id="tNeg">0</div><div class="lbl">Negotiating</div></div>
    <div class="tile t-agreed"><div class="num" id="tAgreed">0</div><div class="lbl">Agreed</div></div>
  </div>

  <div class="toolbar-row">
    <input id="search" placeholder="Search by UUID or creator…" />
    <select id="sort" title="Sort">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="offers">Most offers</option>
    </select>
    <button class="btn-ghost" id="btnRefresh">Refresh</button>
  </div>

  <div class="filter-chips" id="filterChips">
    <button class="fchip active" data-f="all">All</button>
    <button class="fchip" data-f="open">Open</button>
    <button class="fchip" data-f="negotiating">Negotiating</button>
    <button class="fchip" data-f="agreed">Agreed</button>
  </div>

  <div id="negList" class="neg-list"></div>
</div>

<script src="assets/js/ui.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>
